services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shayfinance
      POSTGRES_USER: shayfinance
      POSTGRES_PASSWORD: shayfinance_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shayfinance"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://shayfinance:shayfinance_dev@db:5432/shayfinance
      - CHROMIUM_PATH=/usr/bin/chromium
    env_file:
      - .env
    profiles:
      - production

volumes:
  pgdata:
